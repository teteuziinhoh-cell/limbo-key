<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbo Keys Game</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
        #game { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .key { width: 100%; padding: 20px; text-align: center; background-color: #4CAF50; border-radius: 5px; color: white; transition: background-color 0.3s; cursor: pointer; }
        .key:hover { background-color: #45a049; }
        #difficultySlider { width: 100%; margin: 20px; }
    </style>
</head>
<body>
    <div id="game"></div>
    <input id="difficultySlider" type="range" min="1" max="10" value="5" step="1">
    <script>
        const gameContainer = document.getElementById('game');
        const difficultySlider = document.getElementById('difficultySlider');
        let keys = [];
        let gameState = 'start';  // 'start', 'playing', 'end'

        const createKeys = (num) => {
            keys = Array.from({length: num}, (_, i) => i + 1);
            shuffle(keys);
            renderKeys();
        };

        const shuffle = (array) => {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        };

        const renderKeys = () => {
            gameContainer.innerHTML = '';
            keys.forEach(key => {
                const keyElement = document.createElement('div');
                keyElement.className = 'key';
                keyElement.innerText = key;
                keyElement.addEventListener('click', () => handleKeyClick(key));
                keyElement.addEventListener('touchstart', () => handleKeyClick(key));
                gameContainer.appendChild(keyElement);
            });
        };

        const handleKeyClick = (key) => {
            if (gameState === 'playing' && keys.includes(key)) {
                // Do something with the clicked key
                const index = keys.indexOf(key);
                keys.splice(index, 1);
                renderKeys();
                if (keys.length === 0) {
                    alert('Congratulations! You completed the game.');
                    gameState = 'end';
                }
            }
        };

        difficultySlider.addEventListener('input', (event) => {
            const difficulty = event.target.value;
            createKeys(difficulty * 2);  // Example adjustment to number of keys based on difficulty
        });

        // Start the game
        createKeys(difficultySlider.value * 2);
        gameState = 'playing';
    </script>
</body>
</html>
